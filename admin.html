<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Professor Seguro – TET-PTP | UFF</title>
<style>
  :root {
    --azul: #1a3a6b;
    --azul-medio: #1e4d8c;
    --cinza-claro: #f5f7fa;
    --cinza-borda: #d0d8e8;
    --texto: #1a1a2e;
    --branco: #ffffff;
    --font-ui: 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-ui);
    color: var(--texto);
    background: #f0f4fb;
    padding: 20px;
  }

  /* ========== TELA DE LOGIN ========== */
  .login-container {
    max-width: 400px;
    margin: 100px auto;
    background: var(--branco);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 14px rgba(26,58,107,0.15);
    border: 1px solid var(--cinza-borda);
    text-align: center;
  }
  .login-container h2 { color: var(--azul); margin-bottom: 20px; }
  .login-container input {
    width: 100%; padding: 12px; margin-bottom: 15px;
    border: 1px solid var(--cinza-borda); border-radius: 6px;
    font-size: 14px;
  }
  .btn {
    background: var(--azul); color: white; border: none;
    padding: 12px 24px; border-radius: 6px; cursor: pointer;
    font-weight: 700; width: 100%; font-size: 15px;
    transition: background 0.2s;
  }
  .btn:hover { background: #122c54; }

  /* ========== PAINEL DE DADOS ========== */
  .panel-container { display: none; max-width: 1200px; margin: 0 auto; }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; background: var(--branco); padding: 20px;
    border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .panel-header h1 { color: var(--azul); font-size: 22px; }
  .btn-export { background: #27ae60; width: auto; padding: 12px 30px; }
  .btn-export:hover { background: #219152; }
  .btn-logout { background: #c0392b; width: auto; padding: 6px 15px; font-size: 12px; margin-top: 5px;}
  .btn-logout:hover { background: #962d22; }
  
  .table-responsive {
    background: var(--branco); border-radius: 8px;
    overflow-x: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border: 1px solid var(--cinza-borda);
  }
  table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
  th, td { padding: 12px 15px; border-bottom: 1px solid var(--cinza-borda); }
  th { background: var(--azul); color: white; font-weight: 600; text-transform: uppercase; font-size: 11px; }
  tr:hover { background: var(--cinza-claro); }
</style>
</head>
<body>

  <!-- 1. TELA DE LOGIN -->
  <div class="login-container" id="loginBlock">
    <h2>Acesso do Professor</h2>
    <input type="email" id="email" placeholder="E-mail do Professor">
    <input type="password" id="senha" placeholder="Senha">
    <button class="btn" onclick="efetuarLoginFirebase()">Entrar no Painel</button>
  </div>

  <!-- 2. PAINEL DE DADOS APÓS LOGIN -->
  <div class="panel-container" id="panelBlock">
    <div class="panel-header">
      <div>
        <h1>Painel de Resultados – Banco de Dados Firestore</h1>
        <p id="totalRegistros">Carregando registros...</p>
        <button class="btn btn-logout" onclick="efetuarLogout()">Sair / Logout</button>
      </div>
      <button class="btn btn-export" onclick="exportarParaExcel()">📥 Exportar para Excel (.xlsx)</button>
    </div>

    <div class="table-responsive">
      <table id="tabelaRespostas">
        <thead>
          <tr id="cabecalhoTabela">
            <th>Carregando colunas...</th>
          </tr>
        </thead>
        <tbody id="corpoTabela">
          <!-- Linhas injetadas via JS -->
        </tbody>
      </table>
    </div>
  </div>

<!-- SCRIPTS DO FIREBASE COMPAT (INCLUINDO O APP, AUTH E FIRESTORE) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<!-- BIBLIOTECA SHEETJS PARA GERAR EXCEL NO NAVEGADOR -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
// CONFIGURAÇÕES DO SEU FIREBASE PROJECT
const firebaseConfig = {
  apiKey: "AIzaSyDSqufQ6vdgitvtiPpmR5Min4LkpMrqqRQ",
  authDomain: "pesquisa-turismo-ptp.firebaseapp.com",
  projectId: "pesquisa-turismo-ptp",
  storageBucket: "pesquisa-turismo-ptp.firebasestorage.app",
  messagingSenderId: "268649941715",
  appId: "1:268649941715:web:830c7df285ce2344746226"
};

// Inicializações do Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let dadosLocaisExcel = [];

// Ouvinte de Estado de Autenticação (Mantém a sessão caso a página seja recarregada)
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginBlock').style.display = 'none';
    document.getElementById('panelBlock').style.display = 'block';
    carregarDadosFirestore();
  } else {
    document.getElementById('loginBlock').style.display = 'block';
    document.getElementById('panelBlock').style.display = 'none';
    // Reseta variáveis locais ao deslogar
    dadosLocaisExcel = [];
    document.getElementById('corpoTabela').innerHTML = "";
    document.getElementById('cabecalhoTabela').innerHTML = "<th>Carregando colunas...</th>";
  }
});

// Realiza a tentativa de login via Firebase Authentication
function efetuarLoginFirebase() {
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  if (!email || !senha) {
    alert("Por favor, preencha todos os campos.");
    return;
  }

  auth.signInWithEmailAndPassword(email, senha)
  .catch(error => {
    console.error("Erro de autenticação: ", error);
    alert("E-mail ou senha incorretos.");
  });
}

// Efetua a saída do painel administrativo
function efetuarLogout() {
  auth.signOut();
}

// Carrega os dados coletados de forma dinâmica mapeando todas as colunas existentes no Firestore
function carregarDadosFirestore() {
  // Blindagem de segurança: Aborta o carregamento caso não haja sessão válida ativa no SDK do cliente
  if (!auth.currentUser) {
    console.log("[TET-PTP] Bloqueando tentativa de leitura: Usuário não autenticado.");
    return;
  }

  db.collection("respostas").orderBy("timestamp", "desc").get()
  .then((snapshot) => {
    if (snapshot.empty) {
      document.getElementById('totalRegistros').textContent = "Nenhuma resposta encontrada no banco de dados.";
      return;
    }

    document.getElementById('totalRegistros').textContent = `Total: ${snapshot.size} questionários respondidos.`;

    // 1. Mapear todas as chaves existentes dinamicamente (pois os formulários variam por público)
    let colunas = new Set(["timestamp", "perfil", "modo"]);
    snapshot.forEach(doc => {
      Object.keys(doc.data()).forEach(key => colunas.add(key));
    });
    
    const arrayColunas = Array.from(colunas);

    // 2. Renderizar Cabeçalho da Tabela Administrador
    const cabecalho = document.getElementById('cabecalhoTabela');
    cabecalho.innerHTML = arrayColunas.map(col => `<th>${col.toUpperCase()}</th>`).join('');

    // 3. Renderizar Linhas de Dados da Tabela
    const corpo = document.getElementById('corpoTabela');
    corpo.innerHTML = "";
    dadosLocaisExcel = []; // Limpa o array local de cache do Excel

    snapshot.forEach((doc) => {
      const dados = doc.data();
      dadosLocaisExcel.push(dados); // Popula cache local para o extrator SheetJS

      let trHtml = "<tr>";
      arrayColunas.forEach(col => {
        let valor = dados[col] !== undefined ? dados[col] : "-";
        trHtml += `<td>${valor}</td>`;
      });
      trHtml += "</tr>";
      corpo.innerHTML += trHtml;
    });
  })
  .catch((error) => {
    console.error("Erro ao ler banco de dados: ", error);
    alert("Erro de conexão ou falta de permissão para carregar os dados do Firebase. Verifique as regras do Firestore Database.");
  });
}

// Compila os objetos carregados e faz a extração direta para arquivo .xlsx
function exportarParaExcel() {
  if (dadosLocaisExcel.length === 0) {
    alert("Não há dados carregados para exportar.");
    return;
  }
  
  const worksheet = XLSX.utils.json_to_sheet(dadosLocaisExcel);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Pesquisas_Petropolis");
  
  // Efetua o download do Blob gerado no cliente
  XLSX.writeFile(workbook, "Resultados_Pesquisa_Turismo_Petropolis.xlsx");
}
</script>
</body>
</html>
